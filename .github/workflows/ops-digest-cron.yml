name: Ops Digest Cron

on:
  workflow_dispatch:
  schedule:
    # GitHub uses UTC
    - cron: "55 0 * * *" # Ops digest daily at 07:55 Vietnam time

jobs:
  ops-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: ops-digest-cron
      cancel-in-progress: false
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

      - name: Send ops digest
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/ops-digest"
