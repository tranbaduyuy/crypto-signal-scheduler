name: Health Cron

on:
  workflow_dispatch:
  schedule:
    # GitHub uses UTC. Vietnam time is UTC+7.
    - cron: "6,36 * * * *" # health check twice per hour

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    concurrency:
      group: health-cron
      cancel-in-progress: false
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

      - name: Check app health
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/health"
