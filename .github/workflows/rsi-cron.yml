name: RSI Cron

on:
  workflow_dispatch:
  schedule:
    # GitHub uses UTC. Vietnam time is UTC+7.
    - cron: "11 * * * *" # RSI hourly, offset from top of hour

jobs:
  rsi-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: rsi-cron
      cancel-in-progress: false
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

      - name: Call Vercel Function for RSI Scanner
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/rsi"
