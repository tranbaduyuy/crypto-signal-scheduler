name: Cron Notify

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which job to run
        required: true
        default: all
        type: choice
        options:
          - all
          - outcomes
          - watchlist-scan
          - rsi
          - quasimodo
          - ops-digest
  schedule:
    # GitHub uses UTC
    - cron: "7 * * * *" # watchlist AI scan hourly
    - cron: "13,43 * * * *" # outcomes every 30 minutes
    - cron: "17 * * * *" # RSI hourly
    - cron: "29 * * * *" # Quasimodo hourly
    - cron: "55 0 * * *" # Ops digest daily at 07:55 Vietnam time

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: cron-notify-${{ github.event.schedule || github.event.inputs.target || 'manual' }}
      cancel-in-progress: false
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

      - name: Scan watchlists
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'watchlist-scan')) || github.event.schedule == '7 * * * *' }}
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/watchlist-scan?strategy=intraday&timeframe=15m&limit=5"

      - name: Update open signal outcomes
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'outcomes')) || github.event.schedule == '13,43 * * * *' }}
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/outcomes-update"

      - name: Call Vercel Function for RSI Scanner
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'rsi')) || github.event.schedule == '17 * * * *' }}
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/rsi"

      - name: Call Vercel Function for Quasimodo Scanner
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'quasimodo')) || github.event.schedule == '29 * * * *' }}
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/quasimodo-check"

      - name: Send ops digest
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'ops-digest')) || github.event.schedule == '55 0 * * *' }}
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/ops-digest"
