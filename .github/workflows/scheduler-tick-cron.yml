name: Scheduler Tick Cron

on:
  workflow_dispatch:
  schedule:
    # GitHub uses UTC. The app decides which task slots are due.
    - cron: "*/5 * * * *"

jobs:
  scheduler-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: scheduler-tick-cron
      cancel-in-progress: false
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

      - name: Run scheduler tick
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/scheduler-tick"
