name: Watchlist Trend Cron

on:
  workflow_dispatch:
  schedule:
    # GitHub uses UTC. Vietnam time is UTC+7.
    - cron: "7 0,4,8,12,16,20 * * *" # trend 4h scan after candle close

jobs:
  watchlist-trend-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: watchlist-trend-cron
      cancel-in-progress: false
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

      - name: Scan trend watchlists
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/watchlist-scan?strategy=trend&timeframe=4h&limit=5"
