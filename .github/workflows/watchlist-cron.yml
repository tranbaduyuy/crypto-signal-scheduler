name: Watchlist Cron

on:
  workflow_dispatch:
  schedule:
    # GitHub uses UTC
    - cron: "7 * * * *" # watchlist AI scan hourly

jobs:
  watchlist-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: watchlist-cron
      cancel-in-progress: false
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

      - name: Scan watchlists
        run: |
          curl --fail --show-error --silent --retry 2 --max-time 70 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/watchlist-scan?strategy=intraday&timeframe=15m&limit=5"
